version: "3"
services:

  db:
    image: mongo:latest
    networks:
      - backend
    ports:
      - "27017:27017"
  processor:
    build: ./pdf-processor
    ports:
      - "8181:8181"
    networks:
      - backend
  api:
    build: ./api
    environment:
      - DB_HOST=db
      - DB_NAME=manager
      - PDFPROCESSOR_URL=http://processor:8181
      - BASE_URL=http://192.168.178.38:8080
      - RELEASE_STAGE=development
      - BUGSNAG_API_KEY=1199963e39770335f40ec3c3228a7390
    networks:
      - backend
    ports:
      - "8080:80"
    depends_on:
      - db
      - processor
  app:
    build: ./app
    environment:
      - API_URL=http://localhost:8080
      - WS_URL=ws://localhost:8080/notifications
      - BUGSNAG_KEY=44bd0ddb1369a54aa3cfa44bdf04f21c
    ports:
      - "80:80"
    networks:
      - backend
  fax_watcher:
    build: ./directory-watcher
    environment:
      - DESTINATION=http://api
      - PARSER=fax
    depends_on:
      - api
    networks:
      - backend
    volumes:
      - "./fax:/records"
  scan_watcher:
      build: ./directory-watcher
      environment:
        - DESTINATION=http://api
        - PARSER=generic
        - SENDER=Scan
      depends_on:
        - api
      networks:
        - backend
      volumes:
        - "./scan:/records"
  m1-adapter:
      build: ./m1-adapter

networks:
  backend: